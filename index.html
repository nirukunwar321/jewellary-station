<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Heritage | Ethnic Traditions of Nepal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #C5A059;
            --nepal-red: #9B1B30;
            --ebony: #121212;
            --ivory: #FDFCF8;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--ivory); color: var(--ebony); line-height: 1.6; }
        h1, h2, h3, .serif { font-family: 'Cinzel', serif; }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255,255,255,0.95); padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--ebony); font-size: 12px; font-weight: 600; text-transform: uppercase; }

        /* HERO */
        .hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; margin-top: 60px;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }

        /* ETHNIC FILTERS */
        .filter-section { padding: 60px 5% 20px; text-align: center; }
        .filter-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        .filter-btn {
            padding: 12px 25px; border: 1px solid #ddd; background: white;
            cursor: pointer; transition: var(--transition); font-weight: 600; font-size: 13px;
        }
        .filter-btn.active { background: var(--nepal-red); color: white; border-color: var(--nepal-red); }

        /* GALLERY */
        .gallery { padding: 40px 5% 100px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .product-card { background: white; border: 1px solid #eee; transition: var(--transition); position: relative; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        .img-box { height: 400px; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .product-card:hover .img-box img { transform: scale(1.1); }

        .info { padding: 25px; text-align: center; }
        .eth-tag { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .name { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .price { color: var(--nepal-red); font-family: 'Playfair Display', serif; font-weight: 700; }

        .desc-box { 
            position: absolute; bottom: -100%; left: 0; width: 100%; background: rgba(255,255,255,0.95);
            padding: 20px; transition: var(--transition); border-top: 2px solid var(--gold); font-size: 13px;
        }
        .product-card:hover .desc-box { bottom: 0; }

        /* FOOTER */
        footer { background: var(--ebony); color: white; padding: 60px 5%; text-align: center; }
        .footer-logo { font-size: 24px; margin-bottom: 20px; display: block; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AURA<span>HERITAGE</span></div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Ethnic Collection</a></li>
            <li><a href="#">Modern Fusion</a></li>
            <li><a href="#">About Nepal</a></li>
        </ul>
        <div>🛒</div>
    </nav>

    <section class="hero">
        <h1 class="serif">Ethnic Grandeur</h1>
        <p>A celebration of Nepal's diverse cultural identities</p>
    </section>

    <section class="filter-section">
        <h2>The Heritage Catalog</h2>
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterData('All', this)">All Tradition</button>
            <button class="filter-btn" onclick="filterData('Newar', this)">Newar</button>
            <button class="filter-btn" onclick="filterData('Magar', this)">Magar</button>
            <button class="filter-btn" onclick="filterData('Gurung', this)">Gurung</button>
            <button class="filter-btn" onclick="filterData('Chhetri', this)">Chhetri/Bahun</button>
        </div>
    </section>

    <div class="gallery" id="gallery">
        <!-- JS Injection -->
    </div>

    <footer>
        <span class="footer-logo serif">AURA HERITAGE</span>
        <p>Preserving the craftsmanship of the Himalayas for the world.</p>
        <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">&copy; 2026 Aura Jewels Nepal. All Rights Reserved.</p>
    </footer>

    <script>
        const products = [
            // NEWAR
            {
                name: "Intricate Tayo Necklace",
                eth: "Newar",
                price: "Rs. 4,50,000",
                img: "https://images.unsplash.com/photo-1629241064051-789094770265?q=80&w=600&auto=format&fit=crop",
                desc: "The Tayo is a masterpiece of Newari craftsmanship, featuring a hollow gold pendant shaped like a seed, representing fertility and wealth."
            },
            {
                name: "Makansi Earrings",
                eth: "Newar",
                price: "Rs. 75,000",
                img: "https://images.unsplash.com/photo-1635767798638-3e25273a8236?q=80&w=600&auto=format&fit=crop",
                desc: "Distinctive heavy gold earrings traditionally worn by Newari women, known for their unique hanging design."
            },
            
            // MAGAR
            {
                name: "Golden Kantha Necklace",
                eth: "Magar",
                price: "Rs. 1,85,000",
                img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?q=80&w=600&auto=format&fit=crop",
                desc: "A stunning Magar necklace made of large gold beads separated by red felt (fuchhi), signifying bravery and tradition."
            },
            {
                name: "Magar Marwari Earrings",
                eth: "Magar",
                price: "Rs. 55,000",
                img: "https://images.unsplash.com/photo-1630019852942-f89202989a59?q=80&w=600&auto=format&fit=crop",
                desc: "Large gold hoop earrings, a staple of Magar female identity, reflecting status and heritage."
            },

            // GURUNG
            {
                name: "Dhungri Nose Stud",
                eth: "Gurung",
                price: "Rs. 32,000",
                img: "https://images.unsplash.com/photo-1602751584412-70120c415d4d?q=80&w=600&auto=format&fit=crop",
                desc: "The Gurung Dhungri is a large, flat gold nose stud, often intricately carved with floral patterns."
            },
            {
                name: "Gurung Sirbandi",
                eth: "Gurung",
                price: "Rs. 2,90,000",
                img: "https://images.unsplash.com/photo-1544642899-f0d6e5f6ed6a?q=80&w=600&auto=format&fit=crop",
                desc: "A magnificent headpiece worn across the forehead, symbolizing the brilliance of the sun."
            },

            // CHHETRI
            {
                name: "Traditional Tilhari",
                eth: "Chhetri",
                price: "Rs. 1,60,000",
                img: "https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=600&auto=format&fit=crop",
                desc: "The sacred gold cylinder (Tilhari) strung on green beads (Potey), the ultimate symbol of marriage for Chhetri and Bahun women."
            },
            {
                name: "Royal Bulaki",
                eth: "Chhetri",
                price: "Rs. 25,000",
                img: "https://images.unsplash.com/photo-1617038220319-276d3cfab638?q=80&w=600&auto=format&fit=crop",
                desc: "An ornate gold nose ring that hangs over the upper lip, reflecting the traditional aesthetic of the mid-hills."
            }
        ];

        function render(data) {
            const container = document.getElementById('gallery');
            container.innerHTML = data.map(p => `
                <div class="product-card">
                    <div class="img-box">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="info">
                        <span class="eth-tag">${p.eth} Heritage</span>
                        <h3 class="name">${p.name}</h3>
                        <p class="price">${p.price}</p>
                    </div>
                    <div class="desc-box">
                        <strong>Cultural Significance:</strong><br>
                        ${p.desc}
                    </div>
                </div>
            `).join('');
        }

        function filterData(eth, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if(eth === 'All') render(products);
            else render(products.filter(p => p.eth === eth));
        }

        // Initialize
        render(products);
    </script>
</body>
</html>
